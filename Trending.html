<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>X Tracker PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff7f9;color:#222}
.container{max-width:600px;margin:auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;color:#c8425a}
.btn{padding:6px 10px;border:1px solid #ddd;border-radius:8px;cursor:pointer}

.row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{padding:6px 10px;border:1px solid #f2c4ce;border-radius:20px;cursor:pointer}
.tag.active{background:#c8425a;color:#fff}

.card{background:#fff;border-radius:12px;padding:12px;margin-top:10px;border:1px solid #eee}
.big{font-size:28px;font-weight:800;color:#c8425a}
.small{font-size:12px;color:#777}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.box{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px}

canvas{margin-top:10px;background:#fff;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div class="logo">X TRACKER PRO+</div>
</div>

<div class="row">
  <div class="tag active" onclick="selectTag(this,'JANHAE')">#JANHAE</div>
  <div class="tag" onclick="selectTag(this,'jingjingyu')">#jingjingyu</div>
  <div class="tag" onclick="selectTag(this,'JanJingJing')">#JanJingJing</div>
  <div class="tag" onclick="selectTag(this,'EnemiesWithBenefitsEP5')">#EWBEP5</div>
</div>

<div class="card">
  <div class="small">TOTAL</div>
  <div class="big" id="count">0</div>
  <div class="small" id="status">loading...</div>
</div>

<div class="grid">
  <div class="box">Users <div id="users">0</div></div>
  <div class="box">Eng <div id="eng">0</div></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

let API = "https://你的worker.workers.dev";
let active = "JANHAE";
let history = [];

const chart = new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      label: "Tweet Count",
      data: [],
      borderColor: "#c8425a",
      fill: false
    }]
  }
});

function selectTag(el, tag){
  active = tag;
  document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  fetchData();
}

async function fetchData(){

  try{
    const res = await fetch(`${API}?tag=${active}`);
    const json = await res.json();

    const data = json.data || [];

    let users = new Set();
    let eng = 0;

    data.forEach(x=>{
      if(x.author?.userName) users.add(x.author.userName);
      eng += (x.likeCount||0)+(x.retweetCount||0);
    });

    document.getElementById("count").innerText = data.length;
    document.getElementById("users").innerText = users.size;
    document.getElementById("eng").innerText = eng;

    const now = new Date().toLocaleTimeString();

    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(data.length);

    if(chart.data.labels.length > 20){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }

    chart.update();

    document.getElementById("status").innerText =
      "updated " + now;

  }catch(e){
    console.log(e);
    document.getElementById("status").innerText = "error";
  }
}

fetchData();
setInterval(fetchData, 5000);

</script>

</body>
</html>
