<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>X Tracker PRO+</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#fff8f9;
  color:#2a1018;
}

.container{max-width:520px;margin:auto;padding:16px}

.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;color:#c8425a}
.btn{padding:6px 10px;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:12px}

.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tag{padding:6px 12px;border-radius:20px;border:1px solid #f2c4ce;font-size:12px;cursor:pointer}
.tag.active{background:#c8425a;color:#fff}

/* MAIN */
.card{background:#fff;border-radius:14px;padding:14px;margin-top:10px;border:1px solid #eee}
.big{font-size:34px;font-weight:800;color:#c8425a}
.small{font-size:12px;color:#888}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.box{background:#fff;border:1px solid #eee;border-radius:12px;padding:10px}
.box .v{font-size:20px;font-weight:700}

/* TICKER */
.ticker{
  margin-top:10px;
  background:#111;
  color:#0f0;
  border-radius:12px;
  padding:10px;
  font-family:monospace;
  overflow:hidden;
}
.ticker-item{
  display:flex;
  justify-content:space-between;
  padding:4px 0;
  border-bottom:1px solid #222;
  transition:all .2s;
}
.flash{
  animation:flash .4s ease;
}
@keyframes flash{
  0%{background:#c8425a33}
  100%{background:transparent}
}

.pill{background:#fdf0f2;padding:4px 10px;border-radius:20px;font-size:12px}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div class="logo">X TRACKER PRO+</div>
  <button class="btn" onclick="setWorker()">SET API</button>
</div>

<div class="row" id="tagRow">
  <div class="tag active" onclick="selectTag(this,'JANHAE')">#JANHAE</div>
  <div class="tag" onclick="selectTag(this,'jingjingyu')">#jingjingyu</div>
  <div class="tag" onclick="selectTag(this,'JanJingJing')">#JanJingJing</div>
  <div class="tag" onclick="selectTag(this,'EnemiesWithBenefitsEP5')">#EWB EP5</div>
  <div class="tag" onclick="addTag()">＋</div>
</div>

<div class="card">
  <div class="small" id="title">Total Tweets</div>
  <div class="big" id="tweets">0</div>
  <div class="small" id="sub">waiting...</div>
</div>

<div class="grid">
  <div class="box">
    <div class="small">Users</div>
    <div class="v" id="users">0</div>
  </div>
  <div class="box">
    <div class="small">Engagement</div>
    <div class="v" id="eng">0</div>
  </div>
</div>

<div class="card">
  <div class="small">TREND VELOCITY (10s)</div>
  <div class="pill">Tweets +<span id="vTweets">0</span></div>
  <div class="pill">Users +<span id="vUsers">0</span></div>
  <div class="pill">Eng +<span id="vEng">0</span></div>
</div>

<!-- 🔥 REALTIME TICKER -->
<div class="ticker" id="ticker"></div>

</div>

<script>

let API_BASE = localStorage.getItem("API_BASE") || "";
let active = "JANHAE";
let hashtags = ["JANHAE","jingjingyu","JanJingJing","EnemiesWithBenefitsEP5"];

let prev = {};
let tickerState = {};

function setWorker(){
  const url = prompt("Cloudflare Worker URL");
  if(url){
    API_BASE = url;
    localStorage.setItem("API_BASE",url);
    alert("saved");
  }
}

function fetchTag(tag){
  if(!API_BASE) return null;
  return fetch(`${API_BASE}?tag=${encodeURIComponent(tag)}`).then(r=>r.json()).catch(()=>null);
}

/* ---------------- parse ---------------- */
function parse(data){

  if(!Array.isArray(data)){
    return {tweets:0,users:0,eng:0,velocity:{}};
  }

  let users = new Set();
  let eng = 0;

  data.forEach(x=>{
    if(x.author?.userName) users.add(x.author.userName);
    eng += (x.likeCount||0)+(x.retweetCount||0);
  });

  let current = {
    tweets:data.length,
    users:users.size,
    eng
  };

  let last = prev[active] || current;

  let velocity = {
    tweets: current.tweets - last.tweets,
    users: current.users - last.users,
    eng: current.eng - last.eng
  };

  prev[active] = current;

  return {...current, velocity};
}

/* ---------------- render ---------------- */
function render(tag,d){

  document.getElementById("title").innerText = "#"+tag;
  document.getElementById("tweets").innerText = d.tweets;
  document.getElementById("users").innerText = d.users;
  document.getElementById("eng").innerText = d.eng;

  document.getElementById("vTweets").innerText = d.velocity.tweets;
  document.getElementById("vUsers").innerText = d.velocity.users;
  document.getElementById("vEng").innerText = d.velocity.eng;

}

/* ---------------- ticker ---------------- */
function updateTicker(tag,d){

  tickerState[tag] = d;

  const el = document.getElementById("ticker");
  el.innerHTML = "";

  Object.keys(tickerState).forEach(t=>{

    const d = tickerState[t];

    const div = document.createElement("div");
    div.className = "ticker-item flash";

    div.innerHTML = `
      <div>${t}</div>
      <div>T:${d.tweets} V:${d.velocity.tweets} E:${d.eng}</div>
    `;

    el.appendChild(div);

    setTimeout(()=>div.classList.remove("flash"),300);
  });

}

/* ---------------- update loop ---------------- */
async function update(){

  for(let t of hashtags){

    const data = await fetchTag(t);
    if(!data) continue;

    const d = parse(data);

    if(t === active) render(t,d);

    updateTicker(t,d);
  }

  document.getElementById("sub").innerText =
    "updated " + new Date().toLocaleTimeString();
}

function selectTag(el,t){
  active=t;
  document.querySelectorAll(".tag").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  update();
}

function addTag(){
  let t=prompt("hashtag");
  if(!t) return;
  t=t.replace("#","");
  hashtags.push(t);

  const el=document.createElement("div");
  el.className="tag";
  el.innerText="#"+t;
  el.onclick=()=>selectTag(el,t);

  document.getElementById("tagRow")
    .insertBefore(el,document.querySelector(".tag:last-child"));
}

update();
setInterval(update,10000);

</script>

</body>
</html>
